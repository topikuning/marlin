version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: knmp_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: knmp_monitor
      POSTGRES_USER: knmp_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-knmp_secure_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U knmp_user -d knmp_monitor"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: knmp_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://knmp_user:${DB_PASSWORD:-knmp_secure_password}@db:5432/knmp_monitor
      SECRET_KEY: ${SECRET_KEY:-change-this-secret-key-in-production-32chars}
      DEBUG: ${DEBUG:-false}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: knmp_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    environment:
      - VITE_API_URL=http://backend:8000

volumes:
  postgres_data:
